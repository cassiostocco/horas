<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Carga Horária</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <script async src="https://accounts.google.com/gsi/client" onload="initGoogleSignIn()"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body x-data="app()" x-init="init()">

<!-- ═══════════════════════════════════════════════════════════
     AUTH OVERLAY
════════════════════════════════════════════════════════════ -->
<div class="auth-overlay" x-show="!gauth.unlocked" x-transition>
  <div class="auth-card">
    <div class="auth-logo">⏱</div>
    <h1 class="auth-app-title" x-text="t('appTitle')"></h1>

    <button class="lang-btn auth-lang" @click="toggleLang()" x-text="lang==='pt'?'EN':'PT'"></button>

    <div x-show="gauth.loading" class="auth-loading" x-text="t('signInLoading')"></div>

    <div x-show="!gauth.loading">
      <!-- Returning user: show avatar + continue -->
      <div x-show="gauth.user">
        <img class="auth-avatar" :src="gauth.user?.picture" :alt="gauth.user?.name">
        <h2 class="auth-title" x-text="t('welcomeBack') + ', ' + (gauth.user?.name?.split(' ')[0] ?? '')"></h2>
        <p class="auth-subtitle" x-text="gauth.user?.email"></p>
        <button class="btn-google" @click="signIn()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon" alt="">
          <span x-text="t('continueBtn')"></span>
        </button>
        <button class="btn-link" @click="gauth.user=null;localStorage.removeItem('horas_user')"
          x-text="lang==='pt'?'Usar outra conta':'Use another account'"></button>
      </div>
      <!-- First-time sign in -->
      <div x-show="!gauth.user">
        <h2 class="auth-title" x-text="t('signInTitle')"></h2>
        <p class="auth-subtitle" x-text="t('signInSubtitle')"></p>
        <button class="btn-google" @click="signIn()">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="google-icon" alt="">
          <span x-text="t('signInBtn')"></span>
        </button>
        <!-- Fallback: rendered by Google SDK if One Tap can't display -->
        <div id="g-signin-fallback" style="display:none;justify-content:center;margin-top:.75rem"></div>
      </div>

      <p class="auth-error" x-show="gauth.error" x-text="gauth.error"></p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     SETTINGS MODAL (GitHub Pages hosting)
════════════════════════════════════════════════════════════ -->
<div class="modal-backdrop" x-show="showSettings" @click.self="showSettings=false" x-transition>
  <div class="modal-card">
    <div class="modal-header">
      <h2 x-text="t('settings')"></h2>
      <button class="modal-close" @click="showSettings=false">✕</button>
    </div>
    <div class="modal-body">
      <ol class="howto-steps">
        <li x-text="t('hostingStep1')"></li>
        <li x-text="t('hostingStep2')"></li>
        <li x-text="t('hostingStep3')"></li>
        <li x-text="t('hostingStep4')"></li>
        <li x-text="t('hostingStep5')"></li>
        <li x-text="t('hostingStep6')"></li>
      </ol>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════
     APP (visible only when signed in)
════════════════════════════════════════════════════════════ -->
<div x-show="gauth.unlocked">

<header>
  <div class="header-inner">
    <h1 x-text="t('appTitle')"></h1>
    <div class="header-actions">
      <button class="lang-btn" @click="toggleLang()" x-text="lang==='pt'?'EN':'PT'"></button>
      <button class="icon-btn" @click="showSettings=true" title="Configurações">⚙</button>
      <div class="user-chip" x-show="gauth.user">
        <img class="user-avatar" :src="gauth.user?.picture" :alt="gauth.user?.name">
        <span class="user-name" x-text="gauth.user?.name?.split(' ')[0]"></span>
      </div>
      <span class="sync-dot" x-show="syncStatus==='syncing'" title="Sincronizando...">↻</span>
      <button class="icon-btn icon-btn-danger" @click="signOut()" :title="t('logout')">⏻</button>
    </div>
  </div>
  <nav>
    <button :class="{active:tab==='entries'}" @click="tab='entries'" x-text="t('navEntries')"></button>
    <button :class="{active:tab==='companies'}" @click="tab='companies'" x-text="t('navCompanies')"></button>
    <button :class="{active:tab==='reports'}" @click="tab='reports'" x-text="t('navReports')"></button>
  </nav>
</header>

<main>

  <!-- Sync auth banner — shown when silent token failed (e.g. mobile) -->
  <div class="sync-auth-banner" x-show="gauth.unlocked && needsSheetsAuth">
    <span x-text="t('syncAuthBanner')"></span>
    <button class="btn-sync-auth" @click="authorizeSheetsAndSync()" x-text="t('syncAuthBtn')"></button>
  </div>

  <!-- ══ TAB: ENTRIES ══════════════════════════════════════ -->
  <div x-show="tab==='entries'">

    <!-- Week overview -->
    <div class="card week-card">
      <div class="week-nav-bar">
        <button class="btn-icon" @click="weekNav--">&#8592;</button>
        <span class="week-nav-label" x-text="weekNavLabel()"></span>
        <button class="btn-icon" @click="weekNav++" :disabled="weekNav >= 0">&#8594;</button>
        <button class="btn-icon week-today-btn" x-show="weekNav < 0" @click="weekNav = 0"
          x-text="t('today')"></button>
      </div>
      <div class="week-grid">
        <template x-for="d in weekNavDays()" :key="d.iso">
          <div class="week-cell"
               :class="{'wc-has': d.hasEntry, 'wc-missing': !d.hasEntry && !d.isFuture, 'wc-future': d.isFuture, 'wc-today': d.isToday}"
               @click="!d.isFuture && goToDay(d.iso)">
            <div class="wc-name" x-text="d.label"></div>
            <div class="wc-day" x-text="d.day"></div>
            <div class="wc-total" x-text="d.hasEntry ? fmt(d.total) : (d.isFuture ? '' : '—')"></div>
          </div>
        </template>
      </div>
    </div>

    <div class="card">
      <h2 x-text="editingId ? t('editEntry') : t('newEntry')"></h2>
      <div class="info-msg" x-show="companies.length===0" x-text="t('noCompanyForEntry')"></div>
      <div x-show="companies.length>0">
        <div class="form-grid">
          <div class="field">
            <label class="field-label" x-text="t('company')"></label>
            <select x-model="form.companyId">
              <option value="" x-text="t('selectCompany')"></option>
              <template x-for="c in companies" :key="c.id">
                <option :value="c.id" x-text="c.name"></option>
              </template>
            </select>
          </div>
          <div class="field">
            <label class="field-label" x-text="t('date')"></label>
            <input type="date" x-model="form.date">
          </div>
          <div class="field">
            <label class="field-label" x-text="t('entryTime')"></label>
            <input type="text" inputmode="numeric" placeholder="HH:MM"
              x-model="form.entryTime" @blur="fmtTimeField('entryTime')">
          </div>
          <div class="field">
            <label class="field-label" x-text="t('exitTime')"></label>
            <input type="text" inputmode="numeric" placeholder="HH:MM"
              x-model="form.exitTime" @blur="fmtTimeField('exitTime')">
          </div>
          <div class="field field-full">
            <label class="checkbox-row">
              <input type="checkbox" x-model="form.noLunch">
              <span x-text="t('noLunch')"></span>
            </label>
          </div>
          <div class="field" x-show="!form.noLunch">
            <label class="field-label" x-text="t('lunchOut')"></label>
            <input type="text" inputmode="numeric" placeholder="HH:MM"
              x-model="form.lunchOut" @blur="fmtTimeField('lunchOut')">
          </div>
          <div class="field" x-show="!form.noLunch">
            <label class="field-label" x-text="t('lunchReturn')"></label>
            <input type="text" inputmode="numeric" placeholder="HH:MM"
              x-model="form.lunchReturn" @blur="fmtTimeField('lunchReturn')">
          </div>
        </div>
        <div class="day-preview" x-show="form.entryTime && form.exitTime">
          <span x-text="t('dayTotal') + ': ' + previewTotal()"></span>
        </div>
        <div class="form-actions">
          <button class="btn-primary" @click="submitEntry()" x-text="editingId ? t('save') : t('add')"></button>
          <button class="btn-secondary" x-show="editingId" @click="cancelEdit()" x-text="t('cancel')"></button>
        </div>
        <p class="err" x-show="formError" x-text="formError"></p>
      </div>
    </div>

    <div class="card">
      <h2 x-text="t('recentEntries')"></h2>
      <div class="empty" x-show="entries.length===0" x-text="t('noEntries')"></div>
      <div class="table-wrap" x-show="entries.length>0">
        <table>
          <thead>
            <tr>
              <th x-text="t('date')"></th>
              <th x-text="t('company')"></th>
              <th x-text="t('entryTime')"></th>
              <th x-text="t('lunchOut')"></th>
              <th x-text="t('lunchReturn')"></th>
              <th x-text="t('exitTime')"></th>
              <th x-text="t('total')"></th>
              <th x-text="t('actions')"></th>
            </tr>
          </thead>
          <tbody>
            <template x-for="e in sortedEntries()" :key="e.id">
              <tr>
                <td x-text="fmtDateWithDay(e.date)"></td>
                <td x-text="cname(e.companyId)"></td>
                <td x-text="e.entryTime"></td>
                <td x-text="e.noLunch ? '—' : (e.lunchOut||'—')"></td>
                <td x-text="e.noLunch ? '—' : (e.lunchReturn||'—')"></td>
                <td x-text="e.exitTime"></td>
                <td x-text="fmt(calcMinutes(e))"></td>
                <td>
                  <button class="btn-icon" @click="editEntry(e.id)" x-text="t('edit')"></button>
                  <button class="btn-icon btn-danger" @click="deleteEntry(e.id)" x-text="t('delete')"></button>
                </td>
              </tr>
            </template>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ TAB: COMPANIES ════════════════════════════════════ -->
  <div x-show="tab==='companies'">
    <div class="card">
      <h2 x-text="t('manageCompanies')"></h2>
      <div class="add-row">
        <input type="text" x-model="newCompanyName" :placeholder="t('companyName')" @keydown.enter="addCompany()">
        <button class="btn-primary" @click="addCompany()" x-text="t('addCompany')"></button>
      </div>
      <p class="err" x-show="companyError" x-text="companyError"></p>
      <div class="empty" x-show="companies.length===0" x-text="t('noCompanies')"></div>
      <ul class="company-list" x-show="companies.length>0">
        <template x-for="c in companies" :key="c.id">
          <li>
            <span x-text="c.name"></span>
            <button class="btn-icon btn-danger" @click="removeCompany(c.id)" x-text="t('remove')"></button>
          </li>
        </template>
      </ul>
    </div>
  </div>

  <!-- ══ TAB: REPORTS ══════════════════════════════════════ -->
  <div x-show="tab==='reports'">
    <div class="card">
      <h2 x-text="t('filters')"></h2>
      <div class="form-grid">
        <div class="field">
          <label class="field-label" x-text="t('from')"></label>
          <input type="date" x-model="report.dateFrom">
        </div>
        <div class="field">
          <label class="field-label" x-text="t('to')"></label>
          <input type="date" x-model="report.dateTo">
        </div>
        <div class="field field-full">
          <label class="checkbox-row">
            <input type="checkbox" x-model="report.showTotals">
            <span x-text="t('showTotals')"></span>
          </label>
        </div>
        <div class="field field-full">
          <label class="field-label" x-text="t('companies')"></label>
          <div class="company-checks">
            <label class="check-chip">
              <input type="checkbox" @change="toggleAllCompanies($event)"
                :checked="report.selectedCompanies.length===companies.length && companies.length>0">
              <span x-text="t('allCompanies')"></span>
            </label>
            <template x-for="c in companies" :key="c.id">
              <label class="check-chip">
                <input type="checkbox" :value="c.id" x-model="report.selectedCompanies">
                <span x-text="c.name"></span>
              </label>
            </template>
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-primary" @click="generateReport()" x-text="t('generate')"></button>
        <button class="btn-secondary" x-show="reportData.length>0" @click="exportPDF()" x-text="t('exportPDF')"></button>
        <button class="btn-secondary" x-show="reportData.length>0" @click="exportXLSX()" x-text="t('exportXLSX')"></button>
        <button class="btn-secondary btn-sheets" x-show="reportData.length>0"
          @click="syncToSheets()"
          :disabled="syncStatus==='syncing'"
          x-text="syncStatus==='syncing' ? t('syncing') : t('syncSheets')">
        </button>
        <button class="btn-secondary btn-restore"
          @click="restoreFromSheets()"
          :disabled="syncStatus==='syncing'"
          x-text="syncStatus==='syncing' ? t('syncing') : t('restoreSheets')">
        </button>
      </div>
      <div class="sync-status" x-show="syncStatus==='done'" x-text="t('syncDone')"></div>
      <div class="sync-status" x-show="syncStatus==='restored'" x-text="t('restoreOk')"></div>
      <div class="sync-status sync-error" x-show="syncStatus==='error'" x-text="t('syncError')"></div>
      <div class="sync-status sync-error" x-show="syncStatus==='empty'" x-text="t('restoreEmpty')"></div>
    </div>

    <div x-show="reportGenerated">
      <div class="card" x-show="report.showTotals">
        <div class="summary-strip">
          <div class="sbox">
            <div class="sbox-label" x-text="t('totalFiltered')"></div>
            <div class="sbox-value" x-text="fmt(reportTotals.total)"></div>
          </div>
          <div class="sbox">
            <div class="sbox-label" x-text="t('overtime')"></div>
            <div class="sbox-value ot" x-text="fmt(reportTotals.overtime)"></div>
            <div class="sbox-note" x-text="t('overtimeNote')"></div>
          </div>
        </div>
      </div>

      <div class="card" x-show="reportData.length===0">
        <div class="empty" x-text="t('noData')"></div>
      </div>

      <template x-for="sec in reportData" :key="sec.companyId">
        <div class="card report-section">
          <h3 x-text="sec.companyName"></h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th x-text="t('date')"></th>
                  <th x-text="t('entryTime')"></th>
                  <th x-text="t('lunchOut')"></th>
                  <th x-text="t('lunchReturn')"></th>
                  <th x-text="t('exitTime')"></th>
                  <th x-show="report.showTotals" x-text="t('dayTotal')"></th>
                  <th x-show="report.showTotals" x-text="t('weekSubtotal')"></th>
                  <th x-show="report.showTotals">OT</th>
                </tr>
              </thead>
              <tbody>
                <template x-for="row in sec.rows" :key="row.id">
                  <tr :class="{'week-sub': row.type==='week-sub'}"
                      x-show="row.type!=='week-sub' || report.showTotals">
                    <td x-text="row.date"></td>
                    <td x-text="row.entryTime"></td>
                    <td x-text="row.lunchOut"></td>
                    <td x-text="row.lunchReturn"></td>
                    <td x-text="row.exitTime"></td>
                    <td x-show="report.showTotals" x-text="row.dayTotal"></td>
                    <td x-show="report.showTotals" x-text="row.weekTotal"></td>
                    <td x-show="report.showTotals" x-text="row.ot"></td>
                  </tr>
                </template>
              </tbody>
              <tfoot x-show="report.showTotals">
                <tr>
                  <td colspan="5" x-text="t('companyTotal')"></td>
                  <td x-text="fmt(sec.totalMinutes)"></td>
                  <td></td>
                  <td x-text="sec.overtimeMinutes>0 ? fmt(sec.overtimeMinutes)+' OT' : ''"></td>
                </tr>
              </tfoot>
            </table>
          </div>
          <div class="fortnight-summary" x-show="sec.fortnights.length>0 && report.showTotals">
            <template x-for="ft in sec.fortnights" :key="ft.label">
              <span class="ft-chip" x-text="ft.label + ': ' + fmt(ft.mins)"></span>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>

</main>

<footer>
  <span x-text="t('appTitle') + ' · 2025'"></span>
</footer>

</div><!-- /gauth.unlocked -->

</body>
</html>
